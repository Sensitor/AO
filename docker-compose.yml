services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aocopilot
      POSTGRES_PASSWORD: aocopilot
      POSTGRES_DB: aocopilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aocopilot"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aocopilot
      MINIO_ROOT_PASSWORD: aocopilot
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # console web
    volumes:
      - miniodata:/data

  api:
    build: ./api
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata:
  miniodata:
